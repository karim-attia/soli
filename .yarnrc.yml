# Yarn 4.17 hardened defaults (the 4.12->4.17 migration auto-wrote permissive
# compat overrides; we deliberately adopted the new secure defaults instead):
# - no approvedGitRepositories entry -> git dependencies are blocked (we have none)
# - enableScripts: false -> third-party postinstall scripts don't run, except
#   packages opted in via dependenciesMeta in package.json (only @shopify/react-native-skia,
#   whose postinstall copies the prebuilt native libs and is required for native builds;
#   esbuild's postinstall is just a startup optimization and works without it)
# - npmMinimalAgeGate: 1d -> supply-chain protection; newly published versions are
#   ignored for a day. If an install fails on a just-released version, wait or use
#   npmPreapprovedPackages for that one package.

compressionLevel: mixed

enableGlobalCache: false

enableScripts: false

enableTelemetry: false

logFilters:
  - code: YN0002
    level: discard
  - code: YN0060
    level: discard
  - code: YN0006
    level: discard
  - code: YN0076
    level: discard

nodeLinker: node-modules

npmMinimalAgeGate: 1d

yarnPath: .yarn/releases/yarn-4.17.1.cjs
